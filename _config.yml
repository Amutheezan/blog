# Site Settings
locale: "en-US"
title: "Home"
title_separator: "-"
name: "Amutheezan"
description: "Postdoctoral Fellow at the University of Houston | AI for Transportation Optimization | Reinforcement Learning"

# ✅ FIXED
url: "https://amutheezan.github.io"
baseurl: "/blog"
repository: "amutheezan/blog"

breadcrumbs: true
words_per_minute: 160
future: true
read_more: "enabled"
talkmap_link: false

# Comments
comments:
  provider:

# Atom feed
atom_feed:
  path:

# SEO
google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

# Social
twitter:
  username:
facebook:
  username:
  app_id:
  publisher:
og_image:

social:
  type:
  name:
  links:

# Analytics
analytics:
  provider: "google-universal"
  google:
    tracking_id:

# Author
author:
  name: "Amutheezan"
  avatar: "DP.png"
  bio: "Postdoctoral Fellow"
  location: "Houston, TX"
  employer: "University of Houston"
  googlescholar: "https://scholar.google.com/citations?user=1m6U1cQAAAAJ&hl=en"
  email: "asivagnanam@uh.edu"
  researchgate: "https://www.researchgate.net/profile/Amutheezan-Sivagnanam"
  github: "amutheezan"
  linkedin: "amutheezansivagnanam"
  orcid: "https://orcid.org/0000-0002-4295-529X"
  stackoverflow: "4859531/amutheezan"
  twitter: "amux93"
  x: "amux93"

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  workshops:
    output: true
    permalink: /:collection/:path/
  projects:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: tags
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  - scope:
      path: ""
      type: categories
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Output
permalink: /:categories/:title/
timezone: America/New_York

# Plugins (GitHub Pages safe)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

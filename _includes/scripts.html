<!-- Minimal Mistakes core JavaScript -->
<script src="{{ '/assets/js/main.min.js' | relative_url }}"></script>

<!-- ── Floating control panel ── -->
<div id="site-controls">
  <button class="color-swatch" data-color="blue"   aria-label="Blue theme">🔵 Blue</button>
  <button class="color-swatch" data-color="purple" aria-label="Purple theme">🟣 Purple</button>
  <button class="color-swatch" data-color="green"  aria-label="Green theme">🟢 Green</button>
  <button id="dark-toggle" aria-label="Toggle dark / light mode">
    <i class="fas fa-sun  icon-sun"  aria-hidden="true"></i>
    <i class="fas fa-moon icon-moon" aria-hidden="true"></i>
    <span class="dark-toggle__label"></span>
  </button>
</div>

<script>
(function () {
  /* ── Dark / light ── */
  var btn = document.getElementById('dark-toggle');
  var label = btn ? btn.querySelector('.dark-toggle__label') : null;

  function applyDark(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    if (label) { label.textContent = theme === 'dark' ? 'Light' : 'Dark'; }
    try { localStorage.setItem('theme', theme); } catch (e) {}
  }

  if (btn) {
    var cur = document.documentElement.getAttribute('data-theme') || 'light';
    if (label) { label.textContent = cur === 'dark' ? 'Light' : 'Dark'; }
    btn.addEventListener('click', function () {
      var active = document.documentElement.getAttribute('data-theme') || 'light';
      applyDark(active === 'dark' ? 'light' : 'dark');
    });
  }

  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
      var saved = null;
      try { saved = localStorage.getItem('theme'); } catch (err) {}
      if (!saved) { applyDark(e.matches ? 'dark' : 'light'); }
    });
  }

  /* ── Accent colour ── */
  function applyColor(color) {
    document.documentElement.setAttribute('data-color', color);
    try { localStorage.setItem('color-theme', color); } catch (e) {}
    document.querySelectorAll('.color-swatch').forEach(function (s) {
      s.classList.toggle('active', s.getAttribute('data-color') === color);
    });
  }

  /* Activate saved/default swatch on load */
  var savedColor = document.documentElement.getAttribute('data-color') || 'blue';
  applyColor(savedColor);

  document.querySelectorAll('.color-swatch').forEach(function (swatch) {
    swatch.addEventListener('click', function () {
      applyColor(this.getAttribute('data-color'));
    });
  });
}());
</script>

<!-- Minimal Mistakes core JavaScript -->
<script src="{{ '/assets/js/main.min.js' | relative_url }}"></script>


<script>
(function () {
  /* ── Dark / light ── */
  function applyDark(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('theme', theme); } catch (e) {}
  }

  var headerDark = document.getElementById('dark-mode-toggle');
  if (headerDark) {
    headerDark.addEventListener('click', function () {
      applyDark(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  }

  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
      var saved = null;
      try { saved = localStorage.getItem('theme'); } catch (err) {}
      if (!saved) { applyDark(e.matches ? 'dark' : 'light'); }
    });
  }

  /* ── Accent colour ── */
  function applyColor(color) {
    document.documentElement.setAttribute('data-color', color);
    try { localStorage.setItem('color-theme', color); } catch (e) {}
  }

  applyColor(document.documentElement.getAttribute('data-color') || 'blue');

  /* Header colour button — cycles blue → purple → green → blue */
  var colorMap = ['blue', 'purple', 'green'];
  var headerColor = document.getElementById('color-theme-toggle');
  if (headerColor) {
    headerColor.addEventListener('click', function () {
      var current = document.documentElement.getAttribute('data-color') || 'blue';
      applyColor(colorMap[(colorMap.indexOf(current) + 1) % colorMap.length]);
    });
  }
}());
</script>
